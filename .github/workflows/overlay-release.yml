name: Overlay Release

on:
  push:
    tags:
      - "overlay-v*"

permissions:
  contents: read

concurrency:
  group: overlay-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.13.0
      - name: Require a version tag from main history
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          version="$(node -p "require('./overlay/package.json').version")"
          [[ "$GITHUB_REF_NAME" == "overlay-v$version" ]]
          git fetch --no-tags origin \
            "+refs/heads/$DEFAULT_BRANCH:refs/remotes/origin/$DEFAULT_BRANCH"
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/$DEFAULT_BRANCH"

  service-test:
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./internal/... -count=1

  windows-bundle:
    needs: [validate-tag, service-test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.13.0
          cache: npm
          cache-dependency-path: overlay/package-lock.json
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: overlay/src-tauri
      - run: npm --prefix overlay ci
      - run: npm --prefix overlay test
      - run: npm --prefix overlay run build
      - run: cargo test --manifest-path overlay/src-tauri/Cargo.toml
      - name: Build Windows installers
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1
        with:
          projectPath: overlay
          tauriScript: npm run tauri
          args: --bundles nsis,msi
      - name: Upload Windows installers
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: overlay-windows-installers
          if-no-files-found: error
          path: |
            overlay/src-tauri/target/release/bundle/nsis/*.exe
            overlay/src-tauri/target/release/bundle/msi/*.msi

  macos-signed-bundle:
    needs: [validate-tag, service-test]
    runs-on: macos-14
    environment: overlay-release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.13.0
          cache: npm
          cache-dependency-path: overlay/package-lock.json
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: overlay/src-tauri
      - run: npm --prefix overlay ci
      - run: npm --prefix overlay test
      - run: npm --prefix overlay run build
      - run: cargo test --manifest-path overlay/src-tauri/Cargo.toml
      - name: Verify Apple delivery credentials
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            [[ -n "${!name}" ]]
          done
      - name: Build signed and notarized macOS bundles
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: overlay
          tauriScript: npm run tauri
          args: --bundles app,dmg
      - name: Verify and package macOS bundles
        shell: bash
        run: |
          shopt -s nullglob
          apps=(overlay/src-tauri/target/release/bundle/macos/*.app)
          dmgs=(overlay/src-tauri/target/release/bundle/dmg/*.dmg)
          [[ ${#apps[@]} -eq 1 && ${#dmgs[@]} -eq 1 ]]
          codesign --verify --deep --strict --verbose=2 "${apps[0]}"
          spctl --assess --type execute --verbose=4 "${apps[0]}"
          xcrun stapler validate "${apps[0]}"
          xcrun stapler validate "${dmgs[0]}"
          ditto -c -k --sequesterRsrc --keepParent "${apps[0]}" \
            overlay/src-tauri/target/release/bundle/macos/PalREST-Game-Overlay-signed-notarized.app.zip
          mv "${dmgs[0]}" \
            overlay/src-tauri/target/release/bundle/dmg/PalREST-Game-Overlay-signed-notarized.dmg
      - name: Upload signed macOS bundles
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: overlay-macos-signed-notarized
          if-no-files-found: error
          path: |
            overlay/src-tauri/target/release/bundle/dmg/PalREST-Game-Overlay-signed-notarized.dmg
            overlay/src-tauri/target/release/bundle/macos/PalREST-Game-Overlay-signed-notarized.app.zip

  github-release:
    needs: [windows-bundle, macos-signed-bundle]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Revalidate the release tag commit
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          object_type="$(gh api "repos/$GH_REPO/git/ref/tags/$GITHUB_REF_NAME" --jq '.object.type')"
          object_sha="$(gh api "repos/$GH_REPO/git/ref/tags/$GITHUB_REF_NAME" --jq '.object.sha')"
          for _ in 1 2 3 4 5; do
            if [[ "$object_type" == "commit" ]]; then
              break
            fi
            [[ "$object_type" == "tag" ]]
            object_type="$(gh api "repos/$GH_REPO/git/tags/$object_sha" --jq '.object.type')"
            object_sha="$(gh api "repos/$GH_REPO/git/tags/$object_sha" --jq '.object.sha')"
          done
          [[ "$object_type" == "commit" && "$object_sha" == "$GITHUB_SHA" ]]
      - name: Download verified platform artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mapfile -d '' files < <(find dist -type f -print0)
          [[ ${#files[@]} -gt 0 ]]
          gh release create "$GITHUB_REF_NAME" "${files[@]}" \
            --verify-tag \
            --generate-notes \
            --title "PalREST Game Overlay $GITHUB_REF_NAME"
