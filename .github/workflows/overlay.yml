name: Overlay

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  service-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Test snapshot service
        run: go test ./internal/... -count=1

  overlay-test:
    name: Overlay (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.13.0
          cache: npm
          cache-dependency-path: overlay/package-lock.json
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: overlay/src-tauri

      - name: Install overlay dependencies
        run: npm --prefix overlay ci
      - name: Test overlay frontend
        run: npm --prefix overlay test
      - name: Build overlay frontend
        run: npm --prefix overlay run build
      - name: Test native bridge
        run: cargo test --manifest-path overlay/src-tauri/Cargo.toml

      - name: Build Windows development installers
        if: runner.os == 'Windows'
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1
        with:
          projectPath: overlay
          tauriScript: npm run tauri
          args: --bundles nsis,msi

      - name: Build ad-hoc macOS development bundles
        if: runner.os == 'macOS'
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1
        with:
          projectPath: overlay
          tauriScript: npm run tauri
          args: --bundles app,dmg

      - name: Package ad-hoc macOS app and label development artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          shopt -s nullglob
          apps=(overlay/src-tauri/target/release/bundle/macos/*.app)
          dmgs=(overlay/src-tauri/target/release/bundle/dmg/*.dmg)
          [[ ${#apps[@]} -eq 1 && ${#dmgs[@]} -eq 1 ]]
          ditto -c -k --sequesterRsrc --keepParent "${apps[0]}" \
            overlay/src-tauri/target/release/bundle/macos/PalREST-Game-Overlay-development-unsigned.app.zip
          mv "${dmgs[0]}" \
            overlay/src-tauri/target/release/bundle/dmg/PalREST-Game-Overlay-development-unsigned.dmg

      - name: Upload Windows NSIS and MSI installers
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: overlay-windows-development-installers
          if-no-files-found: error
          path: |
            overlay/src-tauri/target/release/bundle/nsis/*.exe
            overlay/src-tauri/target/release/bundle/msi/*.msi

      - name: Upload ad-hoc macOS development bundles
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: overlay-macos-development-unsigned
          if-no-files-found: error
          path: |
            overlay/src-tauri/target/release/bundle/dmg/PalREST-Game-Overlay-development-unsigned.dmg
            overlay/src-tauri/target/release/bundle/macos/PalREST-Game-Overlay-development-unsigned.app.zip

  macos-signed-delivery:
    name: macOS signed delivery
    needs: [service-test, overlay-test]
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: macos-14
    permissions:
      contents: read
    environment: overlay-release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.13.0
          cache: npm
          cache-dependency-path: overlay/package-lock.json
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: overlay/src-tauri
      - name: Install overlay dependencies
        run: npm --prefix overlay ci

      - name: Verify all Apple delivery credentials are available
        id: signing
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          available=true
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [[ -z "${!name}" ]]; then
              available=false
            fi
          done
          echo "available=$available" >> "$GITHUB_OUTPUT"

      - name: Stop when Apple delivery credentials are incomplete
        if: steps.signing.outputs.available != 'true'
        run: |
          echo "All six Apple delivery secrets are required in overlay-release."
          exit 1

      - name: Build signed and notarized macOS bundles
        if: steps.signing.outputs.available == 'true'
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: overlay
          tauriScript: npm run tauri
          args: --bundles app,dmg

      - name: Package signed app and label delivery artifacts
        if: steps.signing.outputs.available == 'true'
        shell: bash
        run: |
          shopt -s nullglob
          apps=(overlay/src-tauri/target/release/bundle/macos/*.app)
          dmgs=(overlay/src-tauri/target/release/bundle/dmg/*.dmg)
          [[ ${#apps[@]} -eq 1 && ${#dmgs[@]} -eq 1 ]]
          ditto -c -k --sequesterRsrc --keepParent "${apps[0]}" \
            overlay/src-tauri/target/release/bundle/macos/PalREST-Game-Overlay-signed-notarized.app.zip
          mv "${dmgs[0]}" \
            overlay/src-tauri/target/release/bundle/dmg/PalREST-Game-Overlay-signed-notarized.dmg

      - name: Upload signed and notarized macOS bundles
        if: steps.signing.outputs.available == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: overlay-macos-signed-notarized
          if-no-files-found: error
          path: |
            overlay/src-tauri/target/release/bundle/dmg/PalREST-Game-Overlay-signed-notarized.dmg
            overlay/src-tauri/target/release/bundle/macos/PalREST-Game-Overlay-signed-notarized.app.zip
