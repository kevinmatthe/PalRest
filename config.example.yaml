version: 1

server:
  base_url: http://palworld-server:8212/v1/api
  password_env: ADMIN_PASSWORD
  poll_interval: 30s
  request_timeout: 5s
  max_observation_gap: 75s

# Optional observation sampling and raw-data retention. Raw events, trajectory
# points, private player samples, and server metrics are cleaned incrementally
# after this window. Derived/current server state and content-addressed server
# documents are retained as long-term evidence and survive raw cleanup.
observation:
  server_document_interval: 5m
  trajectory_min_distance: 100
  # Milliseconds accumulated from the last sampled known ping. Smaller jitter
  # is ignored; unknown values (NaN/infinite/negative) are stored as 0.
  trajectory_ping_change_threshold: 10
  trajectory_max_interval: 5m
  raw_retention: 90d

# Player IP addresses are stored only in private samples for authenticated
# administrator timeline queries. They are never returned by public endpoints.

# Optional bootstrap defaults. They are used only when the database has no
# policy document; later edits are made in WebUI and stored in SQLite.
policy:
  timezone: Asia/Shanghai
  default:
    enabled: false
    strategy: fixed_window
    period: daily
    reset_at: "04:00"
    limit: 2h
    warning_before: [30m, 10m, 5m, 1m]

# Alternative bootstrap policy.default examples:
#
# Cooldown mode: after 2h online, the player must rest for 30m.
# policy:
#   timezone: Asia/Shanghai
#   default:
#     enabled: true
#     strategy: cooldown
#     cooldown_every: 2h
#     cooldown_rest: 30m
#     warning_before: [30m, 10m, 5m, 1m]
#
# Credit mode: regain 30m credit every 1h offline, capped at 3h.
# policy:
#   timezone: Asia/Shanghai
#   default:
#     enabled: true
#     strategy: credit
#     credit_recover_every: 1h
#     credit_recover_amount: 30m
#     credit_max: 3h
#     warning_before: [30m, 10m, 5m, 1m]

enforcement:
  kick_message: "Playtime limit reached. You can play again after {{ .ResetAt }}."
  announce_message: "{{ .PlayerName }} has {{ .Remaining }} of playtime remaining."
  kick_retry_initial: 15s
  kick_retry_max: 5m

http:
  listen: 0.0.0.0:8080
  # Optional. When both are configured, WebUI can log in and unlock write actions.
  # admin_username_env: PALREST_ADMIN_USERNAME
  # admin_password_env: PALREST_ADMIN_PASSWORD

storage:
  path: /data/guard.db
